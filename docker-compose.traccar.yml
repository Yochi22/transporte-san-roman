services:
  traccar:
    image: traccar/traccar:latest
    restart: unless-stopped
    volumes:
      - ./traccar/conf/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - traccar_logs:/opt/traccar/logs
      - traccar_data:/opt/traccar/data
    ports:
      - "5001:5001/tcp"
      - "8082:8082"

  tcp-tee-baanool:
    image: node:20-alpine
    restart: unless-stopped
    depends_on:
      - traccar
    working_dir: /app
    command: ["node", "tcp-tee-proxy.js"]
    environment:
      LISTEN_PORT: "5002"
      PRIMARY_HOST: "traccar"
      PRIMARY_PORT: "5001"
      MIRROR_HOST: "tracker.baanooliot.com"
      MIRROR_PORT: "8090"
      RESPONSE_SOURCE: "mirror"
    volumes:
      - ./traccar/tcp-tee-proxy.js:/app/tcp-tee-proxy.js:ro
    ports:
      - "5002:5002/tcp"

  traccar-nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - traccar
    volumes:
      - ./traccar/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8088:80"

volumes:
  traccar_logs:
  traccar_data:
